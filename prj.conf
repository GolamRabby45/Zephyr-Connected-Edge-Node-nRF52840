CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Logging/UART
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=8192

# Kernel primitives and diagnostics
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y
CONFIG_ASSERT=y
CONFIG_INIT_STACKS=y
CONFIG_STACK_SENTINEL=y

# Watchdog strategy
CONFIG_TASK_WDT=y
CONFIG_TASK_WDT_CHANNELS=8

# Workqueue and timing
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072

# Drivers/protocol buses
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SPI=y

# Networking and sockets
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_UDP=n
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POSIX_NAMES=y
CONFIG_NET_DHCPV4=y
CONFIG_DNS_RESOLVER=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_AUTO_INIT=y

# HTTP + WebSocket client
CONFIG_HTTP_CLIENT=y
CONFIG_WEBSOCKET_CLIENT=y
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16

# libc helpers
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y

# C++ support (for optional extensions)
CONFIG_CPP=y
CONFIG_STD_CPP17=y

# App defaults from Kconfig
CONFIG_EDGE_NODE_ID="nrf52840-node-01"
CONFIG_EDGE_SAMPLE_PERIOD_MS=100
CONFIG_EDGE_REST_POLL_MS=5000
CONFIG_EDGE_PIPELINE_QUEUE_DEPTH=32
CONFIG_EDGE_TELEMETRY_HOST="192.168.1.10"
CONFIG_EDGE_TELEMETRY_PORT=9000
CONFIG_EDGE_REST_PORT=8080
CONFIG_EDGE_WS_URL="/ws/telemetry"
CONFIG_EDGE_REST_URL="/api/v1/command"
